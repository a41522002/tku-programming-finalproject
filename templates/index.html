<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>撲克牌比大小</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-glow"></div>

    <main class="wrap">
        <h1 class="title">
            <span class="title-icon">♠</span>
            撲克牌比大小
            <span class="title-icon red">♥</span>
        </h1>
        <button id="dealBtn" class="deal-btn">
            <span class="btn-text">開始發牌</span>
        </button>

        <!-- 洗牌動畫舞台 -->
        <div class="shuffle-stage" id="shuffleStage">
            <div class="deck-pile" id="deckPile"></div>
        </div>

        <section class="result" id="resultBox" hidden>
            <div class="winner-banner" id="winnerBanner"></div>

            <div class="players">
                <div class="player" id="p1Box">
                    <h2>Player 1</h2>
                    <div class="hand" id="hand1"></div>
                    <div class="rank-name" id="rank1"></div>
                </div>
                <div class="vs">VS</div>
                <div class="player" id="p2Box">
                    <h2>Player 2</h2>
                    <div class="hand" id="hand2"></div>
                    <div class="rank-name" id="rank2"></div>
                </div>
            </div>
        </section>

        <p class="error" id="errBox" hidden></p>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
